function changeLanguage(lang) {
  currentLang = lang;

  document.querySelectorAll("h4").forEach(el => {
    el.innerText = el.dataset[lang];
  });

  if (lang === "hi") {
    document.getElementById("mainTitle").innerText = "🌾 सब्जियाँ और फसलें";
    document.getElementById("subTitle").innerText = "पूर्ण कृषि जानकारी";
    document.getElementById("backBtn").innerText = "⬅ वापस";
  } else if (lang === "te") {
    document.getElementById("mainTitle").innerText = "🌾 కూరగాయలు మరియు పంటలు";
    document.getElementById("subTitle").innerText = "పూర్తి వ్యవసాయ సమాచారం";
    document.getElementById("backBtn").innerText = "⬅ వెనక్కి";
  } else {
    document.getElementById("mainTitle").innerText = "🌾 Vegetables & Field Crops";
    document.getElementById("subTitle").innerText = "Complete agricultural information";
    document.getElementById("backBtn").innerText = "⬅ Back";
  }

  const infoBox = document.getElementById("cropInfo");
  if (infoBox.style.display === "block" && infoBox.dataset.crop) {
    const crop = infoBox.dataset.crop;
    infoBox.innerHTML = crops[crop][currentLang];
  }
}

function showCrop(crop) {
    selectedCrop = crop;

    const infoBox = document.getElementById("cropInfo");
    infoBox.innerHTML = crops[crop][currentLang];
    infoBox.style.display = "block";
}

function changeLanguage(lang) {
    currentLang = lang;
    localStorage.setItem("language", lang);

    updateStaticText();

    // Update open crop
    if (selectedCrop) {
        showCrop(selectedCrop);
    }
}

</script>
